<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>design generator</h1>
      <p>
        Generate cohesive design concepts, prompts, slogans, titles, descriptions,
        and tags for Redbubble or Etsy planning.
      </p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <h2>controls</h2>

        <label>
          Theme
          <select id="theme">
            <option value="random">random theme</option>
            <option value="retro kitchen">retro kitchen</option>
            <option value="cowgirl western">cowgirl western</option>
            <option value="birdwatching">birdwatching</option>
            <option value="disco party">disco party</option>
            <option value="romantic botanical">romantic botanical</option>
            <option value="coastal grandmother">coastal grandmother</option>
          </select>
        </label>

        <label>
          Vibe
          <select id="vibe">
            <option value="random">random vibe</option>
            <option value="witty feminine">witty feminine</option>
            <option value="earthy cozy">earthy cozy</option>
            <option value="sardonic vintage">sardonic vintage</option>
            <option value="hand-painted playful">hand-painted playful</option>
            <option value="moody artsy">moody artsy</option>
            <option value="maximalist whimsical">maximalist whimsical</option>
            <option value="soft romantic">soft romantic</option>
            <option value="quirky indie">quirky indie</option>
            <option value="retro bold">retro bold</option>
            <option value="charming weird">charming weird</option>
          </select>
        </label>

        <label>
          Design Type
          <select id="designType">
            <option value="random">random type</option>
            <option value="graphic">graphic only</option>
            <option value="slogan">slogan only</option>
            <option value="graphic+slogan">graphic + slogan</option>
            <option value="pattern">pattern</option>
          </select>
        </label>

        <label>
          Product
          <select id="product">
            <option value="random">random product</option>
            <option value="t-shirt">t-shirt</option>
            <option value="sticker">sticker</option>
            <option value="poster">poster</option>
            <option value="pillow">pillow</option>
            <option value="journal">journal</option>
            <option value="tote bag">tote bag</option>
          </select>
        </label>

        <label>
          Number of Variations
          <input id="count" type="number" min="1" max="12" value="4" />
        </label>

        <button id="randomizeBtn" type="button">Randomize All</button>
        <button id="generateBtn" type="button">Generate New Variations</button>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>results</h2>
        </div>

        <div id="results"></div>

        <div id="taste-profile" class="panel taste-profile-panel"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
