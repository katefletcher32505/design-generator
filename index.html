<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>design generator</h1>
      <p>
        Generate cohesive design concepts, prompts, slogans, titles, descriptions,
        and tags for Redbubble or Etsy planning.
      </p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <h2>controls</h2>

        <label>
          Theme
          <input id="theme" type="text" value="retro kitchen" />
        </label>

        <label>
          Vibe
          <input id="vibe" type="text" value="witty feminine" />
        </label>

        <label>
          Design Type
          <select id="designType">
            <option value="graphic">graphic only</option>
            <option value="slogan">slogan only</option>
            <option value="graphic+slogan" selected>graphic + slogan</option>
            <option value="pattern">pattern</option>
          </select>
        </label>

        <label>
          Product
          <select id="product">
            <option>t-shirt</option>
            <option>sticker</option>
            <option>poster</option>
            <option>pillow</option>
            <option>journal</option>
            <option>tote bag</option>
          </select>
        </label>

        <label>
          Number of Variations
          <input id="count" type="number" min="1" max="12" value="4" />
        </label>

        <button id="generateBtn">Generate New Variations</button>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>results</h2>
        </div>

        <div id="results"></div>

        <div id="taste-profile" class="panel taste-profile-panel"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
