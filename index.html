<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>design generator</h1>
      <p>
        Generate original design concepts and isolated artwork assets from any theme.
      </p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <h2>controls</h2>

        <label>
          Theme
          <input id="theme" type="text" value="nature" placeholder="nature, leftist, anti-trump, labor, birds, surreal kitchen, etc." />
        </label>

        <label>
          Tone / Direction
          <input id="tone" type="text" value="smart, original, visually cohesive" placeholder="satirical, hand-painted, protest-poster energy, poetic, etc." />
        </label>

        <label>
          Number of Variations
          <input id="count" type="number" min="1" max="8" value="4" />
        </label>

        <button id="randomizeBtn" type="button">Generate Fresh Concepts</button>
        <button id="generateBtn" type="button">Generate New Variations</button>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>results</h2>
        </div>

        <div id="results"></div>

        <div id="taste-profile" class="panel taste-profile-panel"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
