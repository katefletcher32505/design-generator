<section class="panel form-panel">
  <h2>controls</h2>

  <div class="control-row">
    <label>
      Theme
      <input id="theme" type="text" value="retro kitchen" />
    </label>
    <button class="lock-btn" id="lock-theme" data-locked="true">🔒</button>
  </div>

  <div class="control-row">
    <label>
      Vibe
      <input id="vibe" type="text" value="witty feminine" />
    </label>
    <button class="lock-btn" id="lock-vibe" data-locked="true">🔒</button>
  </div>

  <div class="control-row">
    <label>
      Design Type
      <select id="designType">
        <option value="graphic">graphic only</option>
        <option value="slogan">slogan only</option>
        <option value="graphic+slogan" selected>graphic + slogan</option>
        <option value="pattern">pattern</option>
      </select>
    </label>
    <button class="lock-btn" id="lock-designType" data-locked="true">🔒</button>
  </div>

  <div class="control-row">
    <label>
      Product
      <select id="product">
        <option>t-shirt</option>
        <option>sticker</option>
        <option>poster</option>
        <option>pillow</option>
        <option>journal</option>
        <option>tote bag</option>
      </select>
    </label>
    <button class="lock-btn" id="lock-product" data-locked="true">🔒</button>
  </div>

  <div class="control-row">
    <label>
      Number of Variations
      <input id="count" type="number" min="1" max="12" value="4" />
    </label>
    <button class="lock-btn" id="lock-count" data-locked="true">🔒</button>
  </div>

  <button id="randomizeBtn">Randomize All</button>
  <button id="generateBtn">Generate New Variations</button>
</section>
