<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>design generator</h1>
      <p>
        Generate cute, artsy, isolated design assets from any theme.
      </p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <h2>controls</h2>

        <label>
          Theme
          <input
            id="theme"
            type="text"
            value="nature"
            placeholder="nature, anti-trump, leftist, birds, surreal kitchen, labor rights, etc."
          />
        </label>

        <label>
          Tone / Direction
          <input
            id="tone"
            type="text"
            value="cute, artsy, handmade, clever"
            placeholder="cute, witty, handmade, protest-y, poetic, retro, etc."
          />
        </label>

        <label>
          Design Style Mode
          <select id="styleMode">
            <option value="cute sticker graphic">cute sticker graphic</option>
            <option value="artsy merch graphic">artsy merch graphic</option>
            <option value="retro graphic print">retro graphic print</option>
            <option value="protest poster graphic">protest poster graphic</option>
            <option value="badge or emblem design">badge or emblem design</option>
            <option value="hand-painted print asset">hand-painted print asset</option>
          </select>
        </label>

        <label>
          Canvas Format
          <select id="canvasFormat">
            <option value="square">square</option>
            <option value="portrait">portrait</option>
            <option value="landscape">landscape</option>
          </select>
        </label>

        <label>
          Number of Variations
          <input id="count" type="number" min="1" max="6" value="4" />
        </label>

        <button id="randomizeControlsBtn" type="button">Randomize Controls</button>
        <button id="generateBtn" type="button">Generate New Variations</button>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>results</h2>
        </div>

        <div id="results"></div>

        <div id="taste-profile" class="panel taste-profile-panel"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
